{% extends 'base.html' %}

{% block content %}

<h2>Editar Leitura</h2>

<form id="form" novalidate>
    <label>Temperatura:</label><br>
    <input 
        type="number" 
        step="any" 
        id="temp" 
        value="{{ leitura.temperatura }}"
        required
    ><br><br>

```
<label>Umidade:</label><br>
<input 
    type="number" 
    step="any" 
    id="umid" 
    value="{{ leitura.umidade }}"
    required
><br><br>

<button type="submit">Salvar</button>
```

</form>

<script>
document.getElementById('form').addEventListener('submit', function(e){
    e.preventDefault();

    const temp = document.getElementById('temp').value.replace(',', '.');
    const umid = document.getElementById('umid').value.replace(',', '.');

    fetch(`/leituras/{{ leitura.id }}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            temperatura: parseFloat(temp),
            umidade: parseFloat(umid)
        })
    })
    .then(() => {
        window.location.href = "/leituras";
    })
    .catch(() => {
        alert("Erro ao atualizar");
    });
});
</script>

{% endblock %}
